<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - pixelis.dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../../assets/favicon.png">
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

    <style>
        /* ===== FULL-VIEWPORT LAYOUT ===== */
        /* Fix navbar for full-viewport layout */
        .navbar {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 15px 40px !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            width: 100%;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Chess game area fills all remaining space under the navbar */
        .chess-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 10px 20px;
            overflow: hidden;
            zoom: 0.85;
        }

        /* ===== BOARD ===== */
        #myBoard {
            width: 460px;
            flex-shrink: 0;
            border: 8px solid #222;
            border-radius: 6px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        /* ===== RIGHT PANEL ===== */
        .game-panel {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 460px; /* matches board */
        }

        /* Bot header: pfp + bubble side by side */
        .bot-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .bot-img-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .bot-img {
            width: 62px;
            height: 62px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            object-fit: cover;
        }

        .elo-tag {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            background: #3d9970;
            color: #fff;
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: bold;
            font-family: 'Share Tech Mono', monospace;
            white-space: nowrap;
        }

        /* Speech bubble */
        .chat-bubble {
            flex-grow: 1;
            background: #302e2c;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            border-top-left-radius: 2px;
            padding: 12px 14px;
            color: #f0f0f0;
            font-size: 0.88rem;
            line-height: 1.5;
            transition: color 0.3s;
        }

        /* Move history */
        .move-history {
            flex: 1;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.06);
            padding: 12px 14px;
            overflow-y: auto;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: #aaa;
        }

        .move-history-header {
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .move-row {
            display: grid;
            grid-template-columns: 28px 1fr 1fr;
            gap: 4px;
            padding: 2px 0;
        }

        .move-row .num { color: #555; }
        .move-row .white-move { color: #ddd; }
        .move-row .black-move { color: #999; }

        /* Status */
        .status-bar {
            background: #1a1a1a;
            border-radius: 8px;
            border-left: 3px solid #3d9970;
            padding: 10px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: #ccc;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .eval-toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            font-family: 'Share Tech Mono', monospace;
        }

        /* Custom Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; cursor: pointer; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #2a2a2a; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: .2s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: #888; border-radius: 50%; transition: .2s; }
        input:checked + .slider { background-color: #3d9970; border-color: #3d9970; }
        input:checked + .slider:before { transform: translateX(14px); background-color: #fff; }

        /* ===== BOARD & PROFILES LAYOUT ===== */
        .board-wrapper {
            display: flex;
            gap: 15px;
            align-items: stretch;
        }

        /* Eval Bar */
        .eval-container {
            width: 30px;
            background: #2a2a2a;
            border-radius: 4px;
            border: 2px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            display: none; /* toggled via js */
            flex-direction: column;
            justify-content: flex-end;
        }

        .eval-fill {
            background: #e0e0e0;
            width: 100%;
            height: 50%; /* 50% = equal */
            transition: height 0.4s ease;
        }

        .eval-score {
            position: absolute;
            width: 100%;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            font-weight: bold;
            color: #fff;
            mix-blend-mode: difference;
            z-index: 2;
            top: 50%;
            transform: translateY(-50%);
        }

        .board-main {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Player Profiles */
        .player-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Syne', sans-serif;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
            background: #2a2a2a;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }

        .profile-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .captured-pieces {
            display: flex;
            align-items: center;
            height: 20px;
            margin-top: 2px;
        }

        .captured-piece {
            width: 18px;
            height: 18px;
            margin-right: -6px;
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.7));
        }

        /* Controls */
        .controls-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            padding: 11px 4px; /* Reduced side padding to fit 3 buttons */
            background: #2a2a2a;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.18s;
            text-align: center;
        }

        .btn-action:hover:not(:disabled) {
            background: #252525;
            border-color: #3d9970;
        }

        .btn-action:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            color: #777;
        }

        /* Highlight for hint */
        .highlight-hint {
            background-color: rgba(46, 204, 113, 0.6) !important;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.4);
            border: 2px solid rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }

        /* ===== Engine thinking indicator ===== */
        .thinking-dots::after {
            content: '';
            animation: dots 1.2s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20%  { content: ''; }
            40%      { content: '.'; }
            60%      { content: '..'; }
            80%, 100%{ content: '...'; }
        }

        /* Chess.com floating button */
        .cc-link {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #3d9970;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(61, 153, 112, 0.4);
            z-index: 100;
        }

        .cc-link:hover {
            transform: translateY(-3px);
            background: #2ecc71;
            box-shadow: 0 6px 20px rgba(61, 153, 112, 0.6);
        }
    </style>
</head>
