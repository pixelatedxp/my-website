    <style>
        :root {
            --bg-dark: #121212;
            --accent-primary: #ffffff;
            --accent-secondary: #525252;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-glow: rgba(255, 255, 255, 0.2);
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- Global Navbar --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 768px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1000;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-primary);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-item {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent-primary);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        html, body {
            background: var(--bg-dark);
            color: var(--accent-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        /* --- Background Aesthetic --- */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 40%);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            pointer-events: none;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 600px; height: 600px; background: rgba(255, 255, 255, 0.08); top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: rgba(255, 255, 255, 0.04); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.1); }
        }

        /* --- Cursor Trail --- */
        .cursor-trail {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
        }

        .circle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        /* --- Main Layout --- */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .hero-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem 2rem;
            border-radius: 40px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        .hero-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        }

        /* --- Content Styling --- */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 14px;
            border-radius: 100px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .logo-img {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            transition: var(--transition);
        }

        .hero-card:hover .logo-img {
            transform: scale(1.05) rotate(5deg);
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.5));
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.04em;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slogan {
            font-size: 0.95rem;
            color: var(--accent-secondary);
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            font-family: 'Inter', sans-serif;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .info-item {
            text-align: left;
        }

        .info-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent-secondary);
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .info-value {
            font-weight: 600;
            font-size: 1rem;
        }

        .pricing-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            text-align: left;
        }

        .pricing-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            display: block;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .pricing-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 1.5rem 1rem;
            border-radius: 20px;
            transition: var(--transition);
            text-align: center;
        }

        .pricing-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .price-val {
            font-size: 1.5rem;
            font-weight: 800;
            display: block;
            margin-bottom: 4px;
            font-family: 'Syne', sans-serif;
        }

        .price-dur {
            font-size: 0.7rem;
            color: var(--accent-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- Discord Button --- */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            color: #000;
            padding: 14px 32px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 2.5rem;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .discord-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15);
            background: transparent;
            color: #fff;
            border-color: #fff;
        }

        .discord-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* --- Fade Up Animation --- */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }

        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            .hero-card { padding: 3rem 1.5rem; }
            .brand-name { font-size: 3.5rem; }
            .slogan { font-size: 0.8rem; letter-spacing: 0.1em; }
            .info-grid { grid-template-columns: 1fr; }
            .pricing-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script>
        // --- Cursor Trail Logic ---
        const coords = { x: 0, y: 0 };
        const circles = [];
        const trail = document.getElementById('trail');
        const count = 20;

        for (let i = 0; i < count; i++) {
            const div = document.createElement('div');
            div.className = 'circle';
            trail.appendChild(div);
            circles.push({
                element: div,
                x: 0,
                y: 0
            });
        }

        window.addEventListener('mousemove', (e) => {
            coords.x = e.clientX;
            coords.y = e.clientY;
        });

        function animateCircles() {
            let x = coords.x;
            let y = coords.y;

            circles.forEach((circle, index) => {
                circle.element.style.left = x - 4 + 'px';
                circle.element.style.top = y - 4 + 'px';
                
                const scale = (count - index) / count;
                circle.element.style.transform = `scale(${scale})`;

                circle.x = x;
                circle.y = y;

                const nextCircle = circles[index + 1] || circles[0];
                x += (nextCircle.x - x) * 0.3;
                y += (nextCircle.y - y) * 0.3;
            });
            requestAnimationFrame(animateCircles);
        }
        animateCircles();

        // --- Fade Up Observer ---
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

        // --- Parallax Effect on Mouse Move ---
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const card = document.querySelector('.hero-card');
            const orbs = document.querySelectorAll('.orb');
            
            const moveX = (x - 0.5) * 20;
            const moveY = (y - 0.5) * 20;
            
            card.style.transform = `translate(${moveX}px, ${moveY}px)`;
            
            orbs.forEach((orb, i) => {
                const speed = (i + 1) * 30;
                orb.style.transform = `translate(${(x - 0.5) * speed}px, ${(y - 0.5) * speed}px)`;
            });
        });

        // Initialize scroll to top
        document.addEventListener('DOMContentLoaded', () => {
            if ('scrollRestoration' in history) {
                history.scrollRestoration = 'manual';
            }
            window.scrollTo(0, 0);
        });
    </script>
